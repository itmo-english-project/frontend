
<div class="bg">
    <div class="login-container">
        <div class="mb-2">
            <h1>Login</h1>
        </div>
        <div class="d-flex flex-column mb-2 mw-100">
            <vinput
                #usernameInput
                innerClass="auth-input"
                placeholder="Username"
                [(ngModel)]="authModel.username"
                [validator]="usernameValidator"
                [errorMessage]="usernameError"
            />
            <vinput
                #passwordInput
                innerClass="auth-input"
                placeholder="Password"
                [(ngModel)]="authModel.password"
                [validator]="passwordValidator"
                [errorMessage]="passwordError"
            />
        </div>
        <vbutton
            innerClass="auth-button primary"
            (onClick)="login()"
            [validationSources]="[usernameInput, passwordInput]"
        >Login</vbutton>
        <vbutton
            innerClass="auth-button secondary"
            (onClick)="login()"
            [validationSources]="[usernameInput, passwordInput]"
        >Register</vbutton>
    </div>
</div>
